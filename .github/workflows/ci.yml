name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: Publish the current revision to PyPI via trusted publishing
        required: true
        type: boolean
        default: false

jobs:
  lint-typecheck-test-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests --select F,E9

      - name: Type check
        run: mypy --python-version 3.10 --follow-imports=skip src/gms_mcp/client.py src/gms_mcp/server.py

      - name: Test
        env:
          GMS_SIMULATE: "1"
        run: pytest tests/ -m "not ollama"

      - name: Build
        run: |
          pip install build twine
          rm -rf dist build
          python -m build
          python -m twine check dist/*

  publish-pypi:
    if: >-
      github.repository == 'NUANCE-IT/NUANCE_GMS_MCP' &&
      (github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi))
    needs: lint-typecheck-test-build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          rm -rf dist build
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
